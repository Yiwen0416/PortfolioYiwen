<!DOCTYPE html>
<html lang="en" class="theme-light palette-artist layout-a">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pete Yiwen — Artist portfolio featuring illustrations, digital applications, installations, and 3D models." />

  <title>Pete Yiwen — Portfolio</title>

  <!-- Stylesheets (order matters) -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/palette-artist.css" />
  <link rel="stylesheet" href="css/palette-wcag.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/sections.css" />
</head>

<body>

  <!-- ── Skip navigation link (WCAG 2.4.1) ── -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- ── Aria live region for dynamic announcements ── -->
  <div
    id="aria-announcer"
    aria-live="polite"
    aria-atomic="true"
    class="sr-only"
  ></div>

  <!-- ── Site navigation ── -->
  <header class="site-nav" role="banner">
    <nav aria-label="Main navigation">

      <a href="#home" class="nav-logo" aria-label="Pete Yiwen — home">
        Pete Yiwen
      </a>

      <ul class="nav-links" role="list">
        <li>
          <a href="#gallery" class="nav-link">Work</a>
        </li>
        <li>
          <a href="#statement" class="nav-link">Statement</a>
        </li>
        <li>
          <a href="#contact" class="nav-link">Contact</a>
        </li>
        <li>
          <a href="#storage" class="nav-link">Archive</a>
        </li>
      </ul>

      <div class="nav-controls" role="group" aria-label="Display controls">

        <!-- Palette toggle -->
        <button
          id="btn-palette"
          class="icon-btn"
          aria-label="Switch to WCAG AA palette"
          aria-pressed="false"
          title="Toggle color palette"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="8.5" cy="14.5" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="15.5" cy="14.5" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="12" cy="9" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </button>

        <!-- Dark / light toggle -->
        <button
          id="btn-theme"
          class="icon-btn"
          aria-label="Switch to dark mode"
          aria-pressed="false"
          title="Toggle dark mode"
        >
          <!-- Icon injected by ui.js -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>

      </div>
    </nav>
  </header>

  <!-- ── Main content ── -->
  <main id="main-content" tabindex="-1">

    <!-- Home / Hero -->
    <section
      id="home"
      class="section section-home"
      aria-label="Home"
    >
      <!-- Rendered by ui.js -->
    </section>

    <!-- Gallery -->
    <section
      id="gallery"
      class="section section-gallery"
      aria-label="Gallery"
      hidden
      aria-hidden="true"
    >
      <!-- Rendered by gallery.js -->
    </section>

    <!-- Artwork detail -->
    <section
      id="artwork-detail"
      class="section section-detail"
      aria-label="Artwork detail"
      hidden
      aria-hidden="true"
    >
      <!-- Rendered by detail.js -->
    </section>

    <!-- Artist statement -->
    <section
      id="statement"
      class="section section-statement"
      aria-label="Artist statement"
      hidden
      aria-hidden="true"
    >
      <!-- Rendered by ui.js -->
    </section>

    <!-- Contact -->
    <section
      id="contact"
      class="section section-contact"
      aria-label="Contact"
      hidden
      aria-hidden="true"
    >
      <!-- Rendered by ui.js -->
    </section>

    <!-- Private archive / storage -->
    <section
      id="storage"
      class="section section-storage"
      aria-label="Private image archive"
      hidden
      aria-hidden="true"
    >
      <!-- Rendered by ui.js -->
    </section>

  </main>

  <!-- ── Anthropic API key modal ── -->
  <dialog
    id="api-key-modal"
    aria-labelledby="api-key-title"
    aria-describedby="api-key-desc"
  >
    <h2 id="api-key-title" class="modal-title">Anthropic API Key</h2>
    <p id="api-key-desc" class="modal-desc">
      Your key is stored only in this browser's <code>localStorage</code> and is
      sent exclusively to Anthropic's API when you generate image descriptions.
      It is never stored on any server or shared with anyone.
    </p>
    <div class="form-group">
      <label class="form-label" for="api-key-input">API Key</label>
      <input
        type="password"
        id="api-key-input"
        class="form-input"
        placeholder="sk-ant-api03-..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    <div class="modal-actions">
      <button id="btn-cancel-api-key" class="btn btn-ghost">Cancel</button>
      <button id="btn-save-api-key" class="btn btn-primary">Save key</button>
    </div>
  </dialog>

  <!-- ── JavaScript (load order is significant) ── -->
  <script src="js/data.js"></script>
  <script src="js/router.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/alttext.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/ui.js"></script>

</body>
</html>
